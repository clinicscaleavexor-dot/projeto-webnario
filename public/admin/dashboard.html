<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Webnário · Painel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/styles.css" />
  <script src="../config.js"></script>
</head>
<body>
  <header class="topbar">
    <div class="brand"><span class="dot"></span> Webnário</div>
    <div class="row">
      <a href="users.html" id="users-link" class="btn btn--ghost btn--sm hidden">Usuários</a>
      <a href="dispatch.html" class="btn btn--ghost btn--sm">📢 Disparo em grupos</a>
      <span class="pill" id="who"></span>
      <button class="btn btn--ghost btn--sm" id="logout">Sair</button>
    </div>
  </header>

  <main class="container stack">
    <!-- Configurações da conta -->
    <div class="card" id="account-settings" style="padding:1rem 1.2rem;">
      <div class="row spread wrap" style="gap:.7rem;align-items:center;">
        <div>
          <span style="font-weight:700;font-size:.95rem;">Domínio da conta</span>
          <span class="muted" style="font-size:.82rem;margin-left:.6rem;" id="domain-current"></span>
        </div>
        <div class="row" style="gap:.5rem;flex:1;max-width:460px;">
          <input id="account-domain" placeholder="ex: aula.seudomain.com.br"
            style="flex:1;padding:.45em .75em;font-size:.9rem;" />
          <button class="btn btn--sm btn--primary" id="save-domain">Salvar</button>
        </div>
      </div>
      <small class="muted" style="display:block;margin-top:.4rem;font-size:.78rem;">
        Configure seu subdomínio na Vercel e cole aqui. Deixe em branco para usar o link padrão.
      </small>
    </div>

    <nav class="tabs" id="dash-tabs">
      <button class="tab active" data-tab="webinars">Meus webinários</button>
      <button class="tab" data-tab="metrics">Métricas</button>
    </nav>

    <div class="tab-panel active" data-panel="webinars">
      <div class="row spread wrap">
        <div>
          <h1 class="mb0">Meus webinários</h1>
          <small class="muted">Crie e gerencie suas lives simuladas.</small>
        </div>
        <button class="btn btn--primary" id="new-webinar">+ Novo webinário</button>
      </div>
      <div id="list" class="list"></div>
    </div>

    <div class="tab-panel" data-panel="metrics">
      <div id="metrics-content"><p class="muted">Carregando métricas...</p></div>
    </div>
  </main>

  <script type="module" src="dashboard.js"></script>
</body>
</html>
