<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Escolha seu horário</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/styles.css" />
  <link rel="stylesheet" href="schedule.css" />
  <script src="config.js"></script>

<body class="sched-body">
  <div id="loading" class="fullscreen-msg"><div class="spinner"></div><p>Carregando...</p></div>
  <div id="error" class="fullscreen-msg hidden"><h2>Webinário não encontrado</h2><p class="muted">Verifique o link ou tente novamente.</p></div>

  <div id="app" class="sched-shell hidden">
    <header class="sched-top">
      <div class="brand"><span class="dot"></span> Webnário</div>
    </header>

    <main class="sched-main">
      <div class="sched-hero">
        <h1 id="webinar-title">Webinário</h1>
        <p class="muted" id="webinar-sub">Escolha o melhor horário para você assistir à transmissão ao vivo.</p>
      </div>

      <!-- Slots de horário -->
      <div id="slots">
        <!-- Cards especiais: Agora e 30 min -->
        <div class="slots-special" id="slots-special"></div>
        <!-- Cards regulares agrupados por dia -->
        <div id="slots-days"></div>
      </div>

      <!-- Modal de captura de lead -->
      <div id="lead-modal" class="lead-modal hidden">
        <div class="lead-modal-backdrop" id="lead-backdrop"></div>
        <div class="lead-modal-box">
          <h2 class="lead-title">Garanta sua vaga!</h2>
          <p class="muted lead-sub" id="lead-sub">Preencha os dados abaixo para recebermos o link da aula no horário.</p>
          <div class="field">
            <label>Nome completo</label>
            <input id="lead-name" type="text" placeholder="Seu nome" autocomplete="name" />
          </div>
          <div class="field">
            <label>Telefone (WhatsApp)</label>
            <input id="lead-phone" type="tel" placeholder="(11) 9 0000-0000" autocomplete="tel" />
          </div>
          <div id="lead-error" class="lead-error hidden"></div>
          <button class="btn btn--primary btn--block" id="lead-submit">Confirmar horário</button>
          <button class="btn btn--ghost btn--block btn--sm" id="lead-cancel">Cancelar</button>
        </div>
      </div>

      <!-- Confirmação após escolha ou lead -->
      <div id="confirm-box" class="confirm-box hidden">
        <div class="confirm-inner card stack">
          <div class="confirm-check">✓</div>
          <h2 class="mb0" id="confirm-heading">Horário confirmado!</h2>
          <p class="muted mt0" id="confirm-label"></p>
          <a id="confirm-watch" class="btn btn--primary btn--block" target="_blank">Acessar transmissão</a>
          <button class="btn btn--ghost btn--block btn--sm" id="copy-confirm">Copiar link da live</button>
          <button class="btn btn--ghost btn--block btn--sm" id="back-btn">← Escolher outro horário</button>
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="schedule.js"></script>
</body>
</html>
